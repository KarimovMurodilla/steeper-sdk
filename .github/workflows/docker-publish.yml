name: Publish Docker images

# Builds and pushes the backend and frontend images to GitHub Container
# Registry (GHCR). Uses the built-in GITHUB_TOKEN — no secrets to configure.
#
# Tags produced:
#   - push of a `vX.Y.Z` tag  -> X.Y.Z, X.Y, latest   (release images)
#   - push to `main`          -> main, sha-<short>     (rolling images)
#
# After the first run, mark the packages public at
# https://github.com/users/KarimovMurodilla/packages (Package settings ->
# Change visibility) so self-hosters can pull without auth.

on:
  push:
    tags: ["v*"]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: ghcr.io/karimovmurodilla/steeper-backend
            context: backend
            dockerfile: backend/infra/docker/Dockerfile
          - name: frontend
            image: ghcr.io/karimovmurodilla/steeper-frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          # latest=auto -> the `latest` tag is applied automatically on semver
          # tag builds, not on branch builds.
          flavor: latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
