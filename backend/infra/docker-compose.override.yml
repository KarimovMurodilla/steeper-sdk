# Do not deploy this file on server, it is only for local development

services:
  app-builder:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.dev
    image: steeper-app-dev-image:latest

  app:
    container_name: steeper-app
    image: steeper-app-dev-image:latest
    command: uvicorn src.main.web:app --host 0.0.0.0 --port ${APP_BACKEND_PORT} --reload
    volumes:
      - ..:/app
      - /app/.venv

  celery_worker:
    image: steeper-app-dev-image:latest

  celery_beat:
    image: steeper-app-dev-image:latest

  nginx:
    volumes:
      - ./nginx/dev-nginx.conf:/etc/nginx/conf.d/default.conf

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.dev
    image: steeper-frontend-dev:latest
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
