# Production stack using pre-built images from GHCR.
#
# Unlike docker-compose.yml, this file does NOT build the app/frontend or
# bind-mount source code — it pulls published images and runs them as-is.
# Only nginx is exposed to the host (port 8000); Postgres/Redis/RabbitMQ stay
# on the internal network.
#
# Usage (run from the repo root):
#   docker compose --env-file backend/.env -f backend/infra/docker-compose.prod.yml pull
#   docker compose --env-file backend/.env -f backend/infra/docker-compose.prod.yml up -d
#   # first run only — apply migrations and create the admin user:
#   docker compose --env-file backend/.env -f backend/infra/docker-compose.prod.yml exec app alembic upgrade head
#   docker compose --env-file backend/.env -f backend/infra/docker-compose.prod.yml exec app python -m scripts.createsuperuser
#
# Pin a release with STEEPER_TAG (defaults to "latest"):
#   STEEPER_TAG=0.1.0 docker compose --env-file backend/.env -f backend/infra/docker-compose.prod.yml up -d

x-backend: &backend
  image: "${BACKEND_IMAGE:-ghcr.io/karimovmurodilla/steeper-backend}:${STEEPER_TAG:-latest}"
  env_file: ../.env
  restart: unless-stopped
  networks:
    - steeper-network

services:
  postgres:
    container_name: steeper-postgres
    # The DB image is built once from the repo (PostGIS + init scripts); it is
    # infra, not part of the published app images.
    build:
      context: ..
      dockerfile: infra/postgres/Dockerfile-postgis
    image: steeper-postgres-postgis:18
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/18/main
    volumes:
      - postgres-data-steeper:/var/lib/postgresql
    networks:
      - steeper-network

  redis:
    container_name: steeper-redis
    image: redis:7.4
    restart: unless-stopped
    env_file: ../.env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redis.conf:/etc/redis/redis.conf:ro
      - redis-data:/data
    networks:
      - steeper-network

  rabbitmq:
    container_name: steeper-rabbitmq
    image: rabbitmq:3.12-management
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file: ../.env
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    networks:
      - steeper-network

  app:
    <<: *backend
    container_name: steeper-app
    command: gunicorn -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:${APP_BACKEND_PORT:-8001} --worker-connections 1000 --keep-alive 10 src.main.web:app
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://0.0.0.0:${APP_BACKEND_PORT:-8001}/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery_worker:
    <<: *backend
    container_name: steeper-celery-worker
    command: python -m celery -A celery_tasks.main worker --pool=solo --loglevel=info -E
    volumes:
      - celery-state:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    <<: *backend
    container_name: steeper-celery-beat
    command: python -m celery -A celery_tasks.main beat --loglevel=info
    volumes:
      - /tmp:/tmp
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery monitoring. Not exposed to the host by default — reach it via the
  # internal network or add a `ports: ["5555:5555"]` mapping if you need the UI.
  flower:
    <<: *backend
    container_name: steeper-flower
    restart: always
    command: celery -A celery_tasks.main flower --port=5555 --broker=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672//
    depends_on:
      rabbitmq:
        condition: service_healthy
      celery_worker:
        condition: service_started

  frontend:
    container_name: steeper-frontend
    image: "${FRONTEND_IMAGE:-ghcr.io/karimovmurodilla/steeper-frontend}:${STEEPER_TAG:-latest}"
    restart: always
    networks:
      - steeper-network

  nginx:
    container_name: steeper-nginx
    image: nginx:latest
    restart: always
    volumes:
      - ./nginx/main.conf:/etc/nginx/conf.d/00-main.conf:ro
      - ./nginx/app.conf:/etc/nginx/conf.d/app.conf:ro
    ports:
      - "8000:8000"
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - steeper-network

volumes:
  postgres-data-steeper:
    name: app-postgres-data-steeper
  redis-data:
    name: app-redis-data
  celery-state:
    name: app-celery-state

networks:
  steeper-network:
    name: steeper-network
    driver: bridge
